<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <header>
            <h1>Expense Tracker</h1>
            <p>Track Your Money</p>
        </header>

        <!-- Balance Card -->
        <section class="balance-card">
            <h2>Current Balance</h2>
            <h1 id="balance">₹0</h1>
        </section>

        <!-- Income & Expense Summary -->
        <section class="summary">
            <div class="income-box">
                <h3>Income</h3>
                <p id="income">₹0</p>
            </div>

            <div class="expense-box">
                <h3>Expense</h3>
                <p id="expense">₹0</p>
            </div>
        </section>

        <!-- Add Transaction Form -->
        <section class="form-section">
            <h2>Add Transaction</h2>

            <form id="transaction-form">

                <!-- Transaction Name -->
                <div class="input-group">
                    <label for="text">Transaction Name</label>
                    <input
                        type="text"
                        id="text"
                        placeholder="Enter transaction name"
                        required
                    >
                </div>

                <!-- Amount -->
                <div class="input-group">
                    <label for="amount">Amount</label>
                    <input
                        type="number"
                        id="amount"
                        placeholder="Enter amount"
                        required
                    >
                </div>

                <!-- Category -->
                <div class="input-group">
                    <label for="category">Category</label>
                    <select id="category" required>

                        <optgroup label="Income">
                            <option value="Salary">Salary</option>
                            <option value="Freelancing">Freelancing</option>
                            <option value="Scholarship">Scholarship</option>
                        </optgroup>

                        <optgroup label="Expense">
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                        </optgroup>

                    </select>
                </div>

                <div class="input-group">
                    <label>Transaction Type</label>

                    <label>
                        <input
                            type="radio"
                            name="type"
                            value="income"
                            checked
                        >
                        Income
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="type"
                            value="expense"
                        >
                        Expense
                    </label>
                </div>

                <!-- Date -->
                <div class="input-group">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        id="date"
                        required
                    >
                </div>

                <!-- Submit Button -->
                <button type="submit">
                    + Add Transaction
                </button>

            </form>
        </section>

        <!-- Search Bar -->
        <section class="search-section">
            <input
                type="text"
                id="search"
                placeholder="Search transaction..."
            >
        </section>

        <!-- Filter -->
        <section class="filter-section">
            <select id="filter">
                <option value="all">All Transactions</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </section>

        <!-- Transaction History -->
        <section class="history-section">

            <h2>Transaction History</h2>

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Delete</th>
                    </tr>
                </thead>

                <tbody id="transaction-list">

                    <!-- Transactions will appear here dynamically -->

                </tbody>

            </table>

        </section>

        <!-- Monthly Statistics -->
        <section class="statistics">

            <h2>Monthly Statistics</h2>

            <div class="stats-card">
                <p>Income: <span id="monthly-income">₹0</span></p>
                <p>Expense: <span id="monthly-expense">₹0</span></p>
                <p>Savings: <span id="monthly-saving">₹0</span></p>
            </div>

        </section>

        <!-- Pie Chart -->
        <section class="chart-section">
            <h2>Expense Breakdown</h2>

            <canvas id="expenseChart"></canvas>
        </section>

    </div>
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <script src="project.js"></script>
</body>
</html>
